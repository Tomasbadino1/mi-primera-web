<!DOCTYPE html>
<html lang="es">
  <head>

      </p>
      <button type="button" class="hero__button">Empezar</button>

      <footer class="footer">
        <section class="footer__section" aria-labelledby="footer-social">
          <h2 id="footer-social" class="footer__heading">Redes sociales</h2>
          <nav class="footer__nav" aria-label="Redes sociales">
            <a
              class="footer__link"
              href="https://www.instagram.com/"
              target="_blank"
              rel="noopener noreferrer"
              >Instagram</a
            >
            <a
              class="footer__link"
              href="https://x.com/"
              target="_blank"
              rel="noopener noreferrer"

            <a
              class="footer__link"
              href="https://www.linkedin.com/"
              target="_blank"
              rel="noopener noreferrer"

            <a
              class="footer__link"

              target="_blank"
              rel="noopener noreferrer"
              >YouTube</a
            >
            <a
              class="footer__link"
              href="https://www.tiktok.com/"
              target="_blank"
              rel="noopener noreferrer"
              >TikTok</a

            <a
              class="footer__link"
              href="https://github.com/"
              target="_blank"
              rel="noopener noreferrer"
              >GitHub</a

          </nav>

        <section class="footer__section" aria-labelledby="footer-contact">

          <nav class="footer__nav" aria-label="Formas de contacto">
            <a
              class="footer__link"
              href="https://cursor.com"
              target="_blank"
              rel="noopener noreferrer"
              >Sitio web</a
            >
            <a
              class="footer__link"
              href="mailto:contacto@ejemplo.com"
              >Correo electrónico</a
            >
            <a class="footer__link" href="tel:+34900000000">Teléfono</a>
          </nav>
        </section>

      <a
        href="easter.html"
        class="easter-egg"
